name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-tags: true

      - name: Get previous tag
        id: prevtag
        run: |
          $tags = git tag --sort=-v:refname
          $current = "${{ env.RELEASE_TAG }}"
          $previous = ($tags -split "`n" | Where-Object { $_ -ne $current -and $_ -ne "" } | Select-Object -First 1)
          if (-not $previous) { $previous = $current }
          echo "PREVIOUS_TAG=$previous" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8
        shell: pwsh

      - name: Generate Changelog
        id: changelog
        run: |
          $current = "${{ env.RELEASE_TAG }}"
          $previous = "${{ steps.prevtag.outputs.PREVIOUS_TAG }}"
          
          $log = git log --no-merges --pretty=format:"- %s (%h)" "$previous..$current"
          if (-not $log) {
            $log = git log --no-merges --pretty=format:"- %s (%h)" -n 10
          }
          
          $changelog = "## What's Changed`n`n$log`n`n---`n`n**Full Changelog**: https://github.com/${{ github.repository }}/compare/$previous...$current"
          
          # Write to GITHUB_OUTPUT using heredoc format
          @"
          CHANGELOG<<EOF
          $changelog
          EOF
          "@ | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8
        shell: pwsh

      - name: Update Scoop Manifest
        id: prepare
        run: |
          $version = "${{ env.RELEASE_TAG }}"
          
          # Update scoop manifest version and URL using jq
          jq --arg version "$version" '.version = $version | .url = "https://github.com/lvyuemeng/spx/archive/refs/tags/" + $version + ".zip"' spx.json | Set-Content -Path spx.json -Encoding UTF8
          
          Write-Host "Updated scoop manifest:"
          Get-Content -Path "spx.json"
        shell: pwsh

      - name: Commit manifest changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add spx.json
          git commit -m "Update spx.json to ${{ env.RELEASE_TAG }}"
          git push origin HEAD:refs/heads/release-${{ env.RELEASE_TAG }} -f
        shell: pwsh

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Update spx.json to ${{ env.RELEASE_TAG }}',
              body: 'Update spx.json to ${{ env.RELEASE_TAG }} for Scoop release',
              head: 'release-${{ env.RELEASE_TAG }}',
              base: 'main'
            })
