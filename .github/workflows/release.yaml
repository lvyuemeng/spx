name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Release Assets
        id: prepare
        run: |
          # Remove VERSION_PLACEHOLDER and use actual tag
          $version = "${{ env.RELEASE_TAG }}"
          $zipName = "spx-$version.zip"
          
          Write-Host "Creating zip archive: $zipName"
          Compress-Archive -Path ./* -DestinationPath $zipName -CompressionLevel Optimal -Force
          
          Write-Host "Verifying zip archive:"
          Get-Item $zipName
          
          # Calculate hash for scoop manifest
          $hash = (Get-FileHash -Path $zipName -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA256 Hash: $hash"
          
          # Update scoop manifest with version and hash
          $manifest = Get-Content -Path "spx.json" -Raw
          $manifest = $manifest -replace 'VERSION_PLACEHOLDER', $version
          $manifest | Set-Content -Path "spx.json" -Encoding UTF8
          
          Write-Host "Updated scoop manifest:"
          Get-Content -Path "spx.json"
          
          # Set outputs
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_OUTPUT
          echo "SHA256_HASH=$hash" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ github.event.release.body }}
            
            ---
            
            ## Installation
            
            ### Via Scoop (Recommended)
            ```powershell
            scoop install https://raw.githubusercontent.com/${{ github.repository }}/master/spx.json
            ```
            
            ### Manual Download
            - [spx-${{ env.RELEASE_TAG }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/spx-${{ env.RELEASE_TAG }}.zip)
            
            ## SHA256 Checksum
            ```${{ steps.prepare.outputs.SHA256_HASH }}```
          files: |
            spx-${{ env.RELEASE_TAG }}.zip
            spx.json

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spx.json
          git diff --cached --quiet || git commit -m "chore: update scoop manifest for ${{ env.RELEASE_TAG }}"
          git push
        shell: pwsh
